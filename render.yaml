# Blueprint do Render: cria banco + site + cron de uma vez.
# Como usar: no painel do Render, New -> Blueprint -> selecione este repositorio.
# As variaveis marcadas com sync:false voce preenche no painel (nao ficam no repo).
#
# OBS: nomes de plano (plan) e regiao (region) mudam de tempos em tempos no Render.
# Se o blueprint for recusado por causa de um plano, ajuste para um nome valido
# atual (veja a pagina de precos do Render). Mantenha web, cron e banco na MESMA
# regiao para o banco ficar perto dos servicos.

databases:
  - name: efi-db
    plan: basic-256mb        # ajuste se necessario; "free" expira apos um periodo
    region: oregon

envVarGroups:
  - name: efi-shared
    envVars:
      - key: EFI_CLIENT_ID
        sync: false
      - key: EFI_CLIENT_SECRET
        sync: false
      - key: EFI_PAYEE_CODE
        sync: false
      - key: EFI_SANDBOX
        value: "true"        # troque para "false" quando for producao real
      - key: VALOR_SEMANAL
        value: "800"
      - key: INTERVALO_DIAS
        value: "7"
      - key: MAX_TENTATIVAS
        value: "3"
      # E-mail (opcional). Sem isto, os avisos so vao para o log.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false

services:
  # Site + API
  - type: web
    name: efi-assinatura
    runtime: node
    plan: starter            # pago, sem cold start (recomendado para producao)
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: efi-shared
      - key: DATABASE_URL
        fromDatabase:
          name: efi-db
          property: connectionString

  # Agendador: cobra as assinaturas vencidas, 1x por dia (09:00 UTC).
  - type: cron
    name: efi-cobrar-assinaturas
    runtime: node
    plan: starter
    region: oregon
    branch: main
    schedule: "0 9 * * *"
    buildCommand: npm install
    startCommand: npm run cobrar-assinaturas
    envVars:
      - fromGroup: efi-shared
      - key: DATABASE_URL
        fromDatabase:
          name: efi-db
          property: connectionString
