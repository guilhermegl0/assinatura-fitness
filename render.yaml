# Blueprint do Render: cria banco + site + cron de uma vez.
# Versao GRATUITA (para testes). Para producao, troque os planos:
#   - databases.plan: basic-256mb (ou superior)
#   - web/cron plan: starter (sem cold start)
# Nomes de plano/regiao podem mudar no Render; ajuste se for recusado.

databases:
  - name: efi-db
    plan: free
    region: oregon

envVarGroups:
  - name: efi-shared
    envVars:
      - key: EFI_CLIENT_ID
        sync: false
      - key: EFI_CLIENT_SECRET
        sync: false
      - key: EFI_PAYEE_CODE
        sync: false
      - key: EFI_SANDBOX
        value: "true"
      - key: VALOR_SEMANAL
        value: "800"
      - key: INTERVALO_DIAS
        value: "7"
      - key: MAX_TENTATIVAS
        value: "3"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false

services:
  - type: web
    name: efi-assinatura
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: efi-shared
      - key: DATABASE_URL
        fromDatabase:
          name: efi-db
          property: connectionString

  - type: cron
    name: efi-cobrar-assinaturas
    runtime: node
    plan: starter
    region: oregon
    branch: main
    schedule: "0 9 * * *"
    buildCommand: npm install
    startCommand: npm run cobrar-assinaturas
    envVars:
      - fromGroup: efi-shared
      - key: DATABASE_URL
        fromDatabase:
          name: efi-db
          property: connectionString
